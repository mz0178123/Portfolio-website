    <style>
        /* 全域基本樣式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #ff512f 0%, #dd2476 50%, #7f00ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #1e293b;
        }

        /* 主體白色大卡片 */
        .container {
            background-color: #f8fafc;
            width: 100%;
            max-width: 1100px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 頂部導覽列 */
        .navbar {
            background-color: #ffffff;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }
        .logo {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #0f172a;
        }
        .nav-icons {
            display: flex;
            gap: 15px;
            color: #64748b;
            cursor: pointer;
        }
        .nav-icons i:hover {
            color: #0f172a;
        }

        /* 主要內容區域（左右分欄） */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            padding: 50px;
            gap: 50px;
        }

        /* ================= 左側欄位 ================= */

            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
