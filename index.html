<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一個 GitHub 網站</title>
    <style>
        /* 簡單優雅的 CSS 樣式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #8ec5fc;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 {
            margin: 10px 0;
            font-size: 24px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
        }
        .links {
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar">🚀</div>
        
        <h1>嗨！我是網頁主人</h1>
        <p>這是我人生中第一個成功部署在 GitHub Pages 上的網站！看來一切運作得很順利嘛 😎</p>
        
        <div class="links">
            <a href="https://github.com" target="_blank" class="btn">我的 GitHub</a>
            <a href="#" class="btn" onclick="alert('感謝點擊！')">聯絡我</a>
        </div>
    </div>

</body>
</html>
